# Ultralytics YOLO11-OBB FTransUNet-style Fusion Model
# 基于论文FTransUNet的多级多模态融合架构
# 输入：6通道图像 (RGB 3ch + IR 3ch)
# 架构：双流特征提取 + 浅层SFF融合 + 深层FVit融合

# Parameters
ch: 6   # 输入通道数 (RGB 3ch + IR 3ch)
nc: 80  # 类别数量

scales: # model compound scaling constants
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  # s: [0.50, 0.50, 1024]
  # m: [0.50, 1.00, 512]
  # l: [1.00, 1.00, 512]
  # x: [1.00, 1.50, 512]

# YOLO11 RGB-IR双流融合backbone (FTransUNet风格)
backbone:
  # [from, repeats, module, args]
  
  # 保存输入以便两个分支都能访问
  - [-1, 1, nn.Identity, []] # 0: 保存原始6通道输入
  
  # 通道选择层: 从保存的输入分离RGB和IR
  - [0, 1, ChannelSelect, [0, 3]] # 1: 选择RGB通道 (0-3通道, 输出3ch)
  - [0, 1, ChannelSelect, [3, 6]] # 2: 选择IR通道 (3-6通道, 输出3ch)
  
  # ========== RGB Stream ==========
  - [1, 1, Conv, [64, 3, 2]] # 3-P1/2 (RGB)
  - [-1, 1, Conv, [128, 3, 2]] # 4-P2/4 (RGB)
  - [-1, 2, C3k2, [256, False, 0.25]] # 5-P2/4之后 (RGB)
  - [-1, 1, Conv, [256, 3, 2]] # 6-P3/8 (RGB)
  - [-1, 2, C3k2, [512, False, 0.25]] # 7-RGB_P3 (RGB)
  - [-1, 1, Conv, [512, 3, 2]] # 8-P4/16 (RGB)
  - [-1, 2, C3k2, [512, True]] # 9-RGB_P4 (RGB)
  - [-1, 1, Conv, [1024, 3, 2]] # 10-P5/32 (RGB)
  - [-1, 2, C3k2, [1024, True]] # 11 (RGB)
  - [-1, 1, SPPF, [1024, 5]] # 12 (RGB)
  - [-1, 2, C2PSA, [1024]] # 13-RGB_P5 (RGB)
  
  # ========== IR Stream ==========
  - [2, 1, Conv, [64, 3, 2]] # 14-P1/2 (IR)
  - [-1, 1, Conv, [128, 3, 2]] # 15-P2/4 (IR)
  - [-1, 2, C3k2, [256, False, 0.25]] # 16-P2/4之后 (IR)
  - [-1, 1, Conv, [256, 3, 2]] # 17-P3/8 (IR)
  - [-1, 2, C3k2, [512, False, 0.25]] # 18-IR_P3 (IR)
  - [-1, 1, Conv, [512, 3, 2]] # 19-P4/16 (IR)
  - [-1, 2, C3k2, [512, True]] # 20-IR_P4 (IR)
  - [-1, 1, Conv, [1024, 3, 2]] # 21-P5/32 (IR)
  - [-1, 2, C3k2, [1024, True]] # 22 (IR)
  - [-1, 1, SPPF, [1024, 5]] # 23 (IR)
  - [-1, 2, C2PSA, [1024]] # 24-IR_P5 (IR)
  
  # P3/8层融合：中层特征融合
  - [[7, 18], 1, MSDeformFusionBlock, [256, 8, 1024, 0.1, 6]]
  # P4/16层融合：深层特征融合
  - [[9, 20], 1, MSDeformFusionBlock, [256, 8, 1024, 0.1, 6]]
  # P5/32层融合：最深层特征融合
  - [[13, 24], 1, MSDeformFusionBlock, [256, 8, 1024, 0.1, 6]]


head:
  - [27, 1, nn.Upsample, [None, 2, "nearest"]] # 28: 上采样 P5 到 P4 (H/16)
  - [[-1, 26], 1, Concat, [1]] # 29: cat P5上采样 + P4融合 (1024 + 512 = 1536通道)
  - [-1, 2, C3k2, [512, False]] # 30: 精炼 P4 融合特征 (512通道)

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 31: 上采样 P4 到 P3 (H/8)
  - [[-1, 25], 1, Concat, [1]] # 32: cat P4上采样 + P3融合 (512 + 512 = 1024通道)
  - [-1, 2, C3k2, [256, False]] # 33: 精炼并输出 P3 检测特征 (256通道, H/8)

  # === Bottom-up path ===
  - [-1, 1, Conv, [256, 3, 2]] # 34: P3 下采样到 P4 尺度 (H/16)
  - [[-1, 30], 1, Concat, [1]] # 35: cat P3下采样 + P4精炼特征 (256 + 512 = 768通道)
  - [-1, 2, C3k2, [512, False]] # 36: 精炼并输出 P4 检测特征 (512通道, H/16)

  - [-1, 1, Conv, [512, 3, 2]] # 37: P4 下采样到 P5 尺度 (H/32)
  - [[-1, 27], 1, Concat, [1]] # 38: cat P4下采样 + P5原融合特征 (512 + 1024 = 1536通道)
  - [-1, 2, C3k2, [1024, True]] # 39: 精炼并输出 P5 检测特征 (1024通道, H/32)

  - [[33, 36, 39], 1, OBB, [nc, 1]]
  # - [[33, 36, 39], 1, FourierHead, [nc, 1, 5]] # 49: FourierHead (nc, ne=1角度, K=3傅里叶阶数)

