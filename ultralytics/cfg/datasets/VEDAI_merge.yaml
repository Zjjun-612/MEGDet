# path: /data/DroneVehicle/merge
train: /data/VEDAI_1024/merge/train/ir/images  # IR图像目录（主要路径，用于标签）
val: /data/VEDAI_1024/merge/val/ir/images      # IR图像目录（主要路径，用于标签）

# RGB图像目录（辅助路径）
train_rgb: /data/VEDAI_1024/merge/train/rgb/images
val_rgb: /data/VEDAI_1024/merge/val/rgb/images


# Dataset settings
channels: 6  # RGB(3) + IR(3) = 6 channels

# 类别名称
names:
  0: car
  1: pickup
  2: camping cars
  3: trucks
  4: Other
  5: tractors
  6: boats
  7: vans

# 类别数量（必需）
nc: 8
